# ============================================================================
# GitHub Actions: Deploy React Frontend to Static Web Apps
# Triggers on changes to frontend/ folder on main branch
# ============================================================================

name: Deploy App (Static Web App)

on:
  workflow_dispatch:   # manual-only — deploy.yml handles SWA deploys on push

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy SWA
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: get-swa-token
        uses: azure/cli@v2
        with:
          inlineScript: |
            SWA_NAME=$(az staticwebapp list -g rg-chatapp-dev --query "[?tags.\"azd-service-name\"=='frontend'].name" -o tsv)
            TOKEN=$(az staticwebapp secrets list -g rg-chatapp-dev -n "$SWA_NAME" --query "properties.apiKey" -o tsv)
            echo "::add-mask::$TOKEN"
            echo "swa_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Build & Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.get-swa-token.outputs.swa_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /frontend
          output_location: dist
          app_build_command: npm run build
