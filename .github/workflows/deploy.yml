name: Deploy — Backend + Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual trigger from GitHub UI

# ─── Environment variables shared across jobs ─────────────────────────────────
env:
  RESOURCE_GROUP: rg-copilot-clr-prod
  LOCATION: eastus2

  # Container App / ACR
  ACR_LOGIN_SERVER: containerregistrylqkh3.azurecr.io
  ACR_IMAGE: containerregistrylqkh3.azurecr.io/copilot-clr-api
  CONTAINER_APP_NAME: copilot-backend
  CONTAINER_APP_ENV: env-copilotclr

  # Web PubSub (re-register event handler after backend deploy)
  WEBPUBSUB_NAME: webpubsub-kvhky
  WEBPUBSUB_HUB: voice

  # Static Web App
  SWA_NAME: swa-kvhky

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 — Build & push backend Docker image to ACR, update Container App
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-backend:
    name: Backend — Docker build → ACR → Container App
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # needed for OIDC login to Azure
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Log in to Azure using a Service Principal stored as a GitHub secret.
      # Secret name: AZURE_CREDENTIALS  (JSON from: az ad sp create-for-rbac)
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Debug Azure context
        run: |
          az account show
          az acr list --output table
          az acr show --name containerregistrylqkh3 || true

      # Authenticate docker to ACR using the SP credentials
      - name: ACR login
        run: az acr login --name containerregistrylqkh3

      # Build image — tag with git SHA for traceability AND :latest for rollout
      - name: Build & push Docker image
        run: |
          IMAGE_TAG=${{ env.ACR_IMAGE }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.ACR_IMAGE }}:latest

          docker build \
            --file backend/Dockerfile \
            --tag "$IMAGE_TAG" \
            --tag "$IMAGE_LATEST" \
            backend/

          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

          echo "IMAGE=$IMAGE_TAG" >> $GITHUB_ENV

      # Update the Container App to use the new SHA-tagged image
      # (more reliable than :latest — avoids revision reuse)
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "$IMAGE" \
            --query "{name:name, latestRevision:properties.latestRevisionName}" \
            --output table

      # Web PubSub validates event handlers via abuse-protection OPTIONS on hub
      # creation/update. On first infra deploy the Container App runs a placeholder
      # image that 404s, so the handler is marked unhealthy. Re-registering the
      # hub AFTER the real backend is running forces re-validation.
      - name: Re-register Web PubSub event handler
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Container App FQDN: $FQDN"

          az webpubsub hub update \
            --hub-name ${{ env.WEBPUBSUB_HUB }} \
            --name ${{ env.WEBPUBSUB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --event-handler \
              url-template="https://${FQDN}/api/webpubsub/voice" \
              user-event-pattern="*" \
              system-event=connect \
              system-event=connected \
              system-event=disconnected

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 — Build frontend, deploy to Azure Static Web Apps
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-frontend:
    name: Frontend — npm build → SWA
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # VITE_API_BASE is empty for SWA (proxied via staticwebapp.config.json)
      # VITE_ vars are baked in at build time by Vite
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_LOCAL_DEV: "false"
          VITE_ENTRA_CLIENT_ID: ${{ secrets.VITE_ENTRA_CLIENT_ID }}
        run: npm run build

      # Deploy dist/ to Azure SWA using the deployment token
      # Secret name: SWA_DEPLOYMENT_TOKEN
      - name: Deploy to Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true          # we already built above with Vite
          output_location: ""
