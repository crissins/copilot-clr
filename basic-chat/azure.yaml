name: hackathon-foundry-agent
metadata:
  template: hackathon-foundry-agent@0.0.1

infra:
  provider: bicep
  path: infra

hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/deploy-model.sh && python3 ./scripts/create_agent.py
      interactive: true
      continueOnError: false
    windows:
      shell: pwsh
      run: bash ./scripts/deploy-model.sh; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }; python ./scripts/create_agent.py
      interactive: true
      continueOnError: false